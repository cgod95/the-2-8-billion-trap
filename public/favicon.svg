<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#faf7f2" />
  <!-- The widening wedge: two lines diverging from a shared origin — real cost
       rising away from a frozen, near-flat subsidy. The motif of the whole piece. -->
  <path d="M5 16 L27 7" stroke="#b4471f" stroke-width="2.4" stroke-linecap="round" />
  <path d="M5 16 L27 18" stroke="#4f6470" stroke-width="2.4" stroke-linecap="round" />
  <path d="M27 7 L27 18 L5 16 Z" fill="#b4471f" fill-opacity="0.14" />
  <circle cx="5" cy="16" r="2.6" fill="#1c1a17" />
</svg>
